services:

  client:
    image: carfast_client
    build:
      context: ./client
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      - DB_HOST=${DB_HOST} 
      - DB_PORT=${DB_PORT}
      - DB_DRIVER=${DB_DRIVER}
      - DB_DIALECT=${DB_DIALECT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      db:
        condition: service_started

        
  server:
    image: carfast_server
    build:
      context: ./server
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DRIVER=${DB_DRIVER}
      - DB_DIALECT=${DB_DIALECT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_MIN_CONNS=${DB_MIN_CONNS}
      - DB_MAX_CONNS=${DB_MAX_CONNS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
    depends_on:
      db:
        condition: service_started
      client:
        condition: service_started


  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./db-data:/var/lib/postgresql
      - ./init-db-scripts:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT}:${DB_PORT}"


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: my_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGA_EMAIL}  # Логин для входа в pgAdmin
      PGADMIN_DEFAULT_PASSWORD: ${PGA_PASSWORD}   # Пароль для входа в pgAdmin
    ports:
      - "${PGA_HOST}:${PGA_PORT}"  # pgAdmin будет доступен на http://localhost:8080
    depends_on:
      - db 

volumes:
  db-data: